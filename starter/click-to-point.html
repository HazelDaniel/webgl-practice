<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Click to point</title>
    <script src="./click-to-point.js"></script>
    <style>
      body {
        padding: 0 8rem;
      }
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
    </style>
  </head>
  <body>
    <canvas id="canvas" style="width: 100%; height: 100%"></canvas>
    <script type="x-shader/vertex" id="vertex-shader">
      attribute vec4 a_position;

      void main () {
        gl_Position = a_position;
        gl_PointSize = 10.0;
      }
    </script>
    <script type="x-shader/fragment" id="fragment-shader">
      precision mediump float;
      uniform vec4 u_fragColor;
      void main () {
        gl_FragColor = u_fragColor;
      }
    </script>
  </body>
</html>
