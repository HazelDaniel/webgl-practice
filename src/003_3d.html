<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Hello Cube (2)</title>
    <script src="../lib/cuon-matrix.js"></script>
    <script src="../dist/003_3d.js" type="module"></script>
    <style>
      * {
        padding: 0;
        margin: 0;
        box-sizing: border-box;
      }
      body {
        overflow-x: hidden;
      }
    </style>
  </head>
  <body style="width: 100vw; height: 100vh">
    <canvas id="webgl-canvas" style="width: 100%; height: 100%"></canvas>
    <script type="x-shader/vertex" id="vertex-source">
      attribute vec4 a_position;
      attribute vec4 a_color;
      attribute vec4 a_norm;

      varying vec4 v_color;
      varying vec4 v_norm;

      uniform mat4 u_viewModelMat;
      uniform mat4 u_Proj;

      vec4 normal;
      vec3 diffuse;
      vec3 lightDirection;
      vec4 vertexPosition;

      varying vec4 v_normal;
      varying vec4 v_position;

      void main () {

        vertexPosition = u_viewModelMat * a_position; // getting position in world coordinates after the transformation
        normal = normalize(a_norm);
        v_normal = normal;
        v_color = a_color;

        v_position = vertexPosition;

        gl_Position =  u_Proj * vertexPosition;
      }
    </script>
    <script type="x-shader/fragment" id="fragment-source">
      precision mediump float;

      varying vec4 v_color;
      varying vec4 v_position;
      varying vec4 v_normal;

      uniform vec4 u_LightColor;
      uniform vec3 u_LightPosition;
      uniform vec3 u_AmbientColor;

      vec3 lightDirection;
      vec3 diffuse;
      float cosTheta;
      vec3 ambient;

      void main () {
        lightDirection = normalize(u_LightPosition - vec3(v_position));
        cosTheta = max(dot(lightDirection, normalize(vec3(v_normal))), 0.0);

        diffuse = vec3(u_LightColor) * vec3(v_color) * cosTheta;
        ambient = u_AmbientColor * v_color.rgb;

        gl_FragColor = vec4(diffuse + ambient, v_color.a);
      }
    </script>
  </body>
</html>
