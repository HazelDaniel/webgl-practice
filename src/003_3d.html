<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Hello Cube (2)</title>
    <script src="../lib/cuon-matrix.js"></script>
    <script src="../dist/003_3d.js" type="module"></script>
    <style>
      * {
        padding: 0;
        margin: 0;
        box-sizing: border-box;
      }
      body {
        overflow-x: hidden;
      }
    </style>
  </head>
  <body style="width: 100vw; height: 100vh">
    <canvas id="webgl-canvas" style="width: 100%; height: 100%"></canvas>
    <script type="x-shader/vertex" id="vertex-source">
      attribute vec4 a_position;
      attribute vec4 a_color;
      attribute vec4 a_norm;

      varying vec4 v_color;

      uniform vec4 u_LightColor;
      uniform vec3 u_LightPosition;
      uniform vec3 u_AmbientColor;
      uniform mat4 u_viewModelMat;
      uniform mat4 u_Proj;

      vec4 normal;
      vec3 diffuse;
      vec3 lightDirection;
      vec4 vertexPosition;

      void main () {

        vertexPosition = u_viewModelMat * a_position; // getting position in world coordinates after the transformation
        lightDirection = normalize(u_LightPosition - vec3(vertexPosition)); // getting the direction of the light source

        normal = normalize(a_norm);
        diffuse = (vec3(u_LightColor) * vec3(a_color)) * max(dot(lightDirection.xyz, normal.xyz), 0.0);

        v_color = vec4(diffuse, 1.0) + vec4((u_AmbientColor * a_color.rgb), 1.0);
        gl_Position =  u_Proj * vertexPosition;
      }
    </script>
    <script type="x-shader/fragment" id="fragment-source">
      precision mediump float;

      varying vec4 v_color;

      void main () {
        gl_FragColor = vec4(v_color.r, v_color.g, v_color.b, 1.0);
      }
    </script>
  </body>
</html>
