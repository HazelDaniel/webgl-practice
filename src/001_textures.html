<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>01 Textures</title>
    <script src="../dist/001_textures.js" type="module"></script>
  </head>
  <body>
    <canvas id="webgl-canvas" style="width: 100%; height: 100%"></canvas>
    <script type="x-shader/vertex" id="vertex-source">
      attribute vec4 a_position;
      attribute vec4 a_color;
      attribute vec2 a_texcoord;

      varying vec4 v_color;
      varying vec2 v_texcoord;

      void main () {
        v_color = a_color;
        v_texcoord = a_texcoord;
        gl_Position = a_position;

      }
    </script>
    <script type="x-shader/fragment" id="fragment-source">
      precision mediump float;

      uniform vec2 u_Dim;
      uniform sampler2D u_Sampler;

      varying vec4 v_color;
      varying vec2 v_texcoord;

      void main () {
        gl_FragColor = texture2D(u_Sampler, v_texcoord);
      }
    </script>
  </body>
</html>
