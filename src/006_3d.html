<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Robot Arm (with picking)</title>
    <script src="../lib/cuon-matrix.js"></script>
    <script src="../dist/006_3d.js" type="module"></script>
    <style>
      * {
        padding: 0;
        margin: 0;
        box-sizing: border-box;
      }
      body {
        min-height: 100vh;
        overflow: hidden;
      }
    </style>
  </head>
  <body style="width: 100vw; height: 100vh">
    <canvas id="webgl-canvas" style="width: 100%; height: 100%"></canvas>
    <script type="x-shader/vertex" id="vertex-source">
      attribute vec4 a_Position;
      attribute vec4 a_Color;
      attribute vec4 a_Norm;
      attribute float a_Face;

      varying vec4 v_Color;

      uniform mat4 u_MVPMat;
      uniform mat4 u_NormalMat;
      uniform vec3 u_LightDirection;
      uniform vec3 u_LightColor;
      uniform int u_Picked;

      vec3 lightDirection;
      vec3 color;
      vec4 normal;
      float cosTheta;
      int face;

      void main () {
        face = int(a_Face);

        normal = normalize(u_NormalMat * a_Norm);
        lightDirection = normalize(u_LightDirection);
        cosTheta = max(dot(normal.xyz, lightDirection), 0.0);

        color = (face != u_Picked) ? (a_Color.rgb * u_LightColor) * cosTheta : ((a_Color.rgb * u_LightColor) * cosTheta) / 5.0;

        if (u_Picked == 0) {
          v_Color = vec4(color, a_Face/255.0);
        } else {
          v_Color = vec4(color, a_Color.a);
        }

        gl_Position =  u_MVPMat * a_Position;
      }
    </script>
    <script type="x-shader/fragment" id="fragment-source">
      #ifdef GL_ES
        precision mediump float;
      #endif

      varying vec4 v_Color;

      void main () {
        gl_FragColor = v_Color;
      }
    </script>
  </body>
</html>
